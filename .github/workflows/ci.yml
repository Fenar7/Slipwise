name: CI

on:
  push:
    branches:
      - master
      - "feature/**"
      - "codex/**"
  pull_request:

env:
  # ── Supabase (dummy values for build/lint/test — no live Supabase in CI) ────
  NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-anon-key-placeholder"
  SUPABASE_SERVICE_ROLE_KEY: "ci-service-role-key-placeholder"
  # ── Database (Prisma generate only — no live DB in CI) ───────────────────────
  DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
  DIRECT_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"
  # ── App ──────────────────────────────────────────────────────────────────────
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_PUBLIC_APP_NAME: "Slipwise One"
  # Build memory: large TypeScript codebase (~790k lines incl. generated Prisma
  # models) exceeds default Node heap during `next build` type-checking phase.
  NODE_OPTIONS: "--max-old-space-size=6144"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
